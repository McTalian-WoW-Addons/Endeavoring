name: Update TOC Interface version(s)

on:
  workflow_dispatch:
  schedule:
    - cron: 0 12 * * *

permissions: {}

jobs:
  toc-update:
    uses: McTalian-WoW-Addons/.github/.github/workflows/toc-updater.yml@main
    with:
      addon-name: Endeavoring
      pr-body: |
        ## Requirements

        - [ ] Download test package in the comments below
        - [ ] Test for all applicable game clients
          - [ ] Retail
          - [ ] Retail PTR

        ----------------------------------------------------
